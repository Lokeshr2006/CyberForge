# Docker Compose Development Configuration

version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: cyberforge-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cyberforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-cyberforge}
      POSTGRES_INITDB_ARGS: ${POSTGRES_INITDB_ARGS:--c ssl=off}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cyberforge}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cyberforge
    command: >
      postgres
      -c log_statement=all
      -c log_duration=on
      -c log_connections=on
      -c log_disconnections=on

  # Redis Cache (Optional)
  redis:
    image: redis:7-alpine
    container_name: cyberforge-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cyberforge
    profiles:
      - with-cache

  # NestJS Backend API
  api:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
      target: development
    container_name: cyberforge-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Server
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      LOG_LEVEL: ${LOG_LEVEL:-debug}

      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-cyberforge}:${POSTGRES_PASSWORD:-secure_password}@db:5432/${POSTGRES_DB:-cyberforge}
      DATABASE_POOL_MIN: ${DATABASE_POOL_MIN:-5}
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-20}

      # JWT & Tokens
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-min-32-chars-long}
      JWT_EXPIRY_SECONDS: ${JWT_EXPIRY_SECONDS:-900}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-your-secret-key-min-32-chars-long}
      REFRESH_TOKEN_EXPIRY_SECONDS: ${REFRESH_TOKEN_EXPIRY_SECONDS:-604800}

      # Encryption
      DATA_KEY_ENCRYPTION_KEY: ${DATA_KEY_ENCRYPTION_KEY:-dGVzdF9lbmNyeXB0aW9uX2tleV8zMl9ieXRlc19sb25nX18=}

      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001}
      CORS_CREDENTIALS: ${CORS_CREDENTIALS:-true}

      # Rate Limiting
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      LOGIN_RATE_LIMIT_MAX: ${LOGIN_RATE_LIMIT_MAX:-5}

      # Security
      SECURE_COOKIES: ${SECURE_COOKIES:-false}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-localhost}

      # Redis (optional)
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}

      # API Versioning
      API_VERSION: ${API_VERSION:-v1}

    volumes:
      - ./apps/api:/app
      - /app/node_modules
    ports:
      - "${PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cyberforge
    command: npm run dev

  # Next.js Frontend
  web:
    build:
      context: .
      dockerfile: infra/Dockerfile.web
      target: development
    container_name: cyberforge-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      # Server
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${WEB_PORT:-3001}

      # API
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:3000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:3000}

      # Security
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret-change-in-production}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3001}

    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "${WEB_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cyberforge
    command: npm run dev

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: cyberforge-nginx
    restart: unless-stopped
    depends_on:
      - api
      - web
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - cyberforge
    profiles:
      - with-nginx

networks:
  cyberforge:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
