version: "3.9"

services:
  # =========================================================================
  # PostgreSQL 16+ Database
  # =========================================================================
  db:
    image: postgres:16-alpine
    container_name: cyberforge-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-cyberforge_db}
      POSTGRES_INITDB_ARGS: "-c shared_preload_libraries=pgcrypto"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cyberforge-net
    restart: unless-stopped

  # =========================================================================
  # Redis (optional, for real-time subscriptions & caching)
  # =========================================================================
  redis:
    image: redis:7-alpine
    container_name: cyberforge-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cyberforge-net
    restart: unless-stopped
    profiles:
      - with-redis

  # =========================================================================
  # NestJS API Backend
  # =========================================================================
  api:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    container_name: cyberforge-api
    environment:
      # Database
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/cyberforge_db}
      
      # API
      API_PORT: ${API_PORT:-3000}
      API_HOST: ${API_HOST:-0.0.0.0}
      NODE_ENV: ${NODE_ENV:-production}
      API_LOG_LEVEL: ${API_LOG_LEVEL:-info}
      
      # JWT
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-900}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-dev-refresh-secret-change-in-production}
      REFRESH_TOKEN_EXPIRATION: ${REFRESH_TOKEN_EXPIRATION:-604800}
      
      # Encryption
      DATA_KEY_ENCRYPTION_KEY: ${DATA_KEY_ENCRYPTION_KEY:-dev-encryption-key-change-in-production}
      
      # Security
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      LOGIN_RATE_LIMIT_WINDOW_MS: ${LOGIN_RATE_LIMIT_WINDOW_MS:-60000}
      LOGIN_RATE_LIMIT_MAX_REQUESTS: ${LOGIN_RATE_LIMIT_MAX_REQUESTS:-5}
      
      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001}
      CORS_CREDENTIALS: ${CORS_CREDENTIALS:-true}
      
      # Redis (optional)
      REDIS_ENABLED: ${REDIS_ENABLED:-false}
      REDIS_URL: ${REDIS_URL:-redis://:redis_password@redis:6379}
      
      # Logging
      LOG_FORMAT: ${LOG_FORMAT:-json}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
        required: false
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    networks:
      - cyberforge-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================================================================
  # Next.js Web Frontend
  # =========================================================================
  web:
    build:
      context: .
      dockerfile: infra/Dockerfile.web
    container_name: cyberforge-web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      NEXT_PUBLIC_ENV: ${NEXT_PUBLIC_ENV:-production}
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "3001:3001"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    networks:
      - cyberforge-net
    restart: unless-stopped

  # =========================================================================
  # Nginx Reverse Proxy (optional, for TLS/HTTPS in production)
  # =========================================================================
  # nginx:
  #   image: nginx:alpine
  #   container_name: cyberforge-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./infra/certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - api
  #     - web
  #   networks:
  #     - cyberforge-net
  #   restart: unless-stopped

networks:
  cyberforge-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
