# Docker Compose Production Configuration

version: '3.8'

services:
  # PostgreSQL Database with encryption ready
  db:
    image: postgres:16-alpine
    container_name: cyberforge-db-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "-c ssl=on -c ssl_cert_file=/var/lib/postgresql/server.crt -c ssl_key_file=/var/lib/postgresql/server.key"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_backups:/var/lib/postgresql/backups
      - ./infra/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./infra/ssl/server.crt:/var/lib/postgresql/server.crt:ro
      - ./infra/ssl/server.key:/var/lib/postgresql/server.key:ro
    ports:
      - "127.0.0.1:5432:5432"  # Internal only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cyberforge-prod
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    security_opt:
      - no-new-privileges:true

  # Redis Cache with AOF persistence
  redis:
    image: redis:7-alpine
    container_name: cyberforge-redis-prod
    restart: always
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"  # Internal only
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cyberforge-prod
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    security_opt:
      - no-new-privileges:true

  # NestJS Backend API
  api:
    image: ${DOCKER_REGISTRY}/cyberforge-api:${API_VERSION:-latest}
    container_name: cyberforge-api-prod
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Server
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      DATABASE_POOL_MIN: 10
      DATABASE_POOL_MAX: 30
      DATABASE_SSL: "true"

      # JWT & Tokens
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_SECONDS: 900
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      REFRESH_TOKEN_EXPIRY_SECONDS: 604800

      # Encryption
      DATA_KEY_ENCRYPTION_KEY: ${DATA_KEY_ENCRYPTION_KEY}

      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN}
      CORS_CREDENTIALS: "true"

      # Rate Limiting
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 100
      LOGIN_RATE_LIMIT_MAX: 5

      # Security
      SECURE_COOKIES: "true"
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379

    ports:
      - "127.0.0.1:3000:3000"  # Internal only
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cyberforge-prod
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        labels: "service=api"
    security_opt:
      - no-new-privileges:true
    read_only_root_filesystem: true
    tmpfs:
      - /tmp
      - /app/.nest

  # Next.js Frontend
  web:
    image: ${DOCKER_REGISTRY}/cyberforge-web:${WEB_VERSION:-latest}
    container_name: cyberforge-web-prod
    restart: always
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}

    ports:
      - "127.0.0.1:3001:3001"  # Internal only
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cyberforge-prod
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        labels: "service=web"
    security_opt:
      - no-new-privileges:true
    read_only_root_filesystem: true
    tmpfs:
      - /tmp

  # Nginx Reverse Proxy with SSL termination
  nginx:
    image: nginx:alpine
    container_name: cyberforge-nginx-prod
    restart: always
    depends_on:
      - api
      - web
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    ports:
      - "80:80"
      - "443:443"
    networks:
      - cyberforge-prod
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    security_opt:
      - no-new-privileges:true

networks:
  cyberforge-prod:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
  postgres_backups:
    driver: local
  redis_data:
    driver: local
  nginx_cache:
    driver: local
