name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (root)
        run: npm install

      - name: Install dependencies (API)
        run: cd apps/api && npm install

      - name: Install dependencies (Web)
        run: cd apps/web && npm install

      - name: ESLint - API
        run: cd apps/api && npm run lint:check

      - name: ESLint - Web
        run: cd apps/web && npm run lint:check

      - name: Prettier Check - API
        run: cd apps/api && npm run format:check

      - name: Prettier Check - Web
        run: cd apps/web && npm run format:check

  type-check:
    name: Type Checking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (API)
        run: cd apps/api && npm install

      - name: TypeScript Check - API
        run: cd apps/api && npm run type-check

      - name: Install dependencies (Web)
        run: cd apps/web && npm install

      - name: TypeScript Check - Web
        run: cd apps/web && npm run type-check

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          cd apps/api && npm install
          cd ../web && npm install

      - name: npm audit (API)
        continue-on-error: true
        run: cd apps/api && npm audit --audit-level=moderate

      - name: npm audit (Web)
        continue-on-error: true
        run: cd apps/web && npm audit --audit-level=moderate

      - name: Snyk scan (API)
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          npm install -g snyk
          cd apps/api && snyk test || true

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cyberforge
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: cyberforge_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (API)
        run: cd apps/api && npm install

      - name: Run migrations (test DB)
        env:
          DATABASE_URL: postgresql://cyberforge:test_password@localhost:5432/cyberforge_test
        run: cd apps/api && npx prisma migrate deploy

      - name: Run tests (API)
        env:
          DATABASE_URL: postgresql://cyberforge:test_password@localhost:5432/cyberforge_test
          NODE_ENV: test
          JWT_SECRET: test_secret_key_32_bytes_long_
          DATA_KEY_ENCRYPTION_KEY: dGVzdF9zZWNyZXRfa2V5XzMyX2J5dGVzX2xvbmdffA==
        run: cd apps/api && npm run test:cov

      - name: Upload coverage (API)
        uses: codecov/codecov-action@v3
        with:
          files: ./apps/api/coverage/coverage-final.json
          flags: api
          fail_ci_if_error: false

      - name: Run tests (Web)
        run: cd apps/web && npm run test:ci || true

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    needs: [lint, type-check, test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "version=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/Dockerfile.api
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/cyberforge-api:latest
            ${{ secrets.DOCKER_USERNAME }}/cyberforge-api:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}/api:latest
            ghcr.io/${{ github.repository }}/api:${{ steps.version.outputs.version }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/cyberforge-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/cyberforge-api:buildcache,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/Dockerfile.web
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/cyberforge-web:latest
            ${{ secrets.DOCKER_USERNAME }}/cyberforge-web:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}/web:latest
            ghcr.io/${{ github.repository }}/web:${{ steps.version.outputs.version }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/cyberforge-web:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/cyberforge-web:buildcache,mode=max

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    needs: build
    environment:
      name: staging
      url: https://staging.cyberforge.example.com

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        env:
          DEPLOY_KEY: ${{ secrets.STAGING_DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.STAGING_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.STAGING_DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts
          
          ssh -i ~/.ssh/deploy_key $DEPLOY_USER@$DEPLOY_HOST << 'EOF'
            cd /opt/cyberforge
            git pull origin develop
            docker compose -f docker-compose.staging.yml pull
            docker compose -f docker-compose.staging.yml up -d
            docker compose exec -T api npx prisma migrate deploy
          EOF

      - name: Health check
        run: |
          for i in {1..30}; do
            if curl -f https://staging.cyberforge.example.com/health; then
              echo "Staging deployment successful"
              exit 0
            fi
            sleep 10
          done
          echo "Staging health check failed"
          exit 1

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    environment:
      name: production
      url: https://cyberforge.example.com
    concurrency:
      group: production-deployment
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          draft: false
          prerelease: false
          body: |
            ## Production Deployment
            - Commit: ${{ github.sha }}
            - Author: ${{ github.actor }}
            
            Docker images:
            - API: ghcr.io/${{ github.repository }}/api:latest
            - Web: ghcr.io/${{ github.repository }}/web:latest

      - name: Deploy to production
        env:
          DEPLOY_KEY: ${{ secrets.PROD_DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.PROD_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.PROD_DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts
          
          ssh -i ~/.ssh/deploy_key $DEPLOY_USER@$DEPLOY_HOST << 'EOF'
            cd /opt/cyberforge
            git pull origin main
            docker compose pull
            docker compose up -d
            docker compose exec -T api npx prisma migrate deploy
          EOF

      - name: Smoke tests
        run: |
          # Test API endpoints
          API_URL="https://cyberforge.example.com/api"
          
          # Health check
          curl -f $API_URL/v1/health
          
          # Login test (use test account)
          TOKEN=$(curl -s -X POST $API_URL/v1/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"test@cyberforge.local","password":"password"}' | jq -r '.access_token')
          
          if [ -z "$TOKEN" ] || [ "$TOKEN" == "null" ]; then
            echo "Login test failed"
            exit 1
          fi
          
          # Verify API response
          curl -f -H "Authorization: Bearer $TOKEN" $API_URL/v1/sites
          
          echo "Smoke tests passed"

      - name: Notify Slack
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "✅ CyberForge production deployment successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ CyberForge production deployment successful\n*Commit:* ${{ github.sha }}\n*Author:* ${{ github.actor }}\n*URL:* https://cyberforge.example.com"
                  }
                }
              ]
            }

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "❌ CyberForge production deployment failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ CyberForge production deployment failed\n*Commit:* ${{ github.sha }}\n*Author:* ${{ github.actor }}\n*Log:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }

  # Scheduled security scanning
  daily-security-scan:
    name: Daily Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
